name: 문서
description: 누락되거나 잘못된 문서를 수정합니다.
title: "[Docs] "
labels:
  - "type: docs"
body:
  - type: input
    id: location
    attributes:
      label: 문서 위치
      placeholder: "예: docs/SECURITY.md 또는 관련 URL"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 문제와 제안
      description: 현재 내용의 문제와 원하는 변경을 적어 주세요.
    validations:
      required: true
  - type: dropdown
    id: mismatch
    attributes:
      label: 코드와 문서 불일치
      options:
        - "해당 없음"
        - "코드가 먼저 변경됨"
        - "문서가 구현보다 앞서 있음"
        - "확인 필요"
    validations:
      required: true
