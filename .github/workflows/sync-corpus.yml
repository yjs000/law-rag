name: Sync legal corpus

on:
  workflow_dispatch:
    inputs:
      command:
        description: Collector command
        type: choice
        options:
          - sync-current
          - sync-history
        default: sync-history

permissions:
  contents: read

concurrency:
  group: legal-corpus-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: [self-hosted, Windows, X64, law-rag-ingestion]
    defaults:
      run:
        working-directory: apps/collector
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.28
      - run: uv sync --frozen --python 3.14
      - run: uv run law-rag-collector ${{ inputs.command }}
        env:
          LAW_OPEN_API_OC: ${{ secrets.LAW_OPEN_API_OC }}
